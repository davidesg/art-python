name: Publish art-tseries

# Publishes the art-tseries package (repo root) to PyPI via trusted publishing
# on an `art-v*` tag.  atsw (the umbrella meta-package in atsw-suite/) has its own
# workflow + `atsw-v*` tag so the two packages release independently from this
# monorepo.

on:
  push:
    tags: ["art-v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      # No install-smoke-test here: art-tseries depends on fue>=0.1.7, which may
      # not be on PyPI yet when this release runs (suite chicken-and-egg). The
      # `python -m build` above validates packaging; import/behaviour tests belong
      # in a separate CI where the deps are available.
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/art-v')
    environment: pypi
    permissions:
      id-token: write   # trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
